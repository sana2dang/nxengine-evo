name: Build Linux AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version (e.g. v2.6.5-1)'
        required: true
        default: 'v2.6.5-1'

env:
  APP_ID: org.nxengine.nxengine_evo
  APP_VERSION: ${{ github.event.inputs.version || 'v2.6.5-1' }}
  PLATFORM_SUFFIX: x86_64
  OUTPUT: NXEngine-Evo-${{ github.event.inputs.version || 'v2.6.5-1' }}-Linux-x86_64.AppImage

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. 빌드 의존성 설치 ───────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq \
            cmake ninja-build \
            libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev \
            libjpeg-dev libpng-dev \
            patchelf desktop-file-utils \
            libgdk-pixbuf2.0-dev fakeroot \
            squashfs-tools file \
            python3-pip libxml2-utils

      # ── 3. appimage-builder 설치 후 ld-linux 복사 버그 패치 ───────────
      # appimage-builder 1.1.0은 ubuntu-22.04에서 /lib64/ld-linux-x86-64.so.2를
      # shutil.copy2()로 복사할 때 PermissionError 발생 (알려진 버그)
      # deploy_helper.py의 _deploy_path()에서 대상 파일이 이미 존재하면
      # 건너뛰도록 패치
      - name: Install appimage-builder and patch ld-linux bug
        run: |
          pip3 install appimage-builder==1.1.0

          # deploy_helper.py 위치 찾기
          DEPLOY_HELPER=$(python3 -c "
          import appimagebuilder.modules.deploy.files.deploy_helper as m
          import inspect, os
          print(os.path.abspath(inspect.getfile(m)))
          ")
          echo "Patching: $DEPLOY_HELPER"

          # _deploy_path 메서드에 "이미 존재하면 skip" 로직 삽입
          python3 << 'PYEOF'
          import re

          path = __import__('subprocess').check_output([
              'python3', '-c',
              'import appimagebuilder.modules.deploy.files.deploy_helper as m, inspect, os; print(os.path.abspath(inspect.getfile(m)))'
          ]).decode().strip()

          with open(path, 'r') as f:
              src = f.read()

          # _deploy_path 메서드 내부에서 shutil.copy2 호출 전에 존재 확인 추가
          old = '        shutil.copy2(path, deploy_path)'
          new = (
              '        if os.path.exists(deploy_path):\n'
              '            return\n'
              '        shutil.copy2(path, deploy_path)'
          )

          if old in src:
              src = src.replace(old, new)
              # os import 확인 후 없으면 추가
              if 'import os' not in src:
                  src = 'import os\n' + src
              with open(path, 'w') as f:
                  f.write(src)
              print(f"Patched successfully: {path}")
          else:
              print("Pattern not found - checking file content:")
              print(src[src.find('def _deploy_path'):src.find('def _deploy_path')+300])
          PYEOF

      # ── 4. ld-linux를 AppDir에 미리 복사 (sudo로 권한 확보) ──────────
      # 패치된 deploy_helper가 기존 파일 발견 시 skip하도록
      - name: Pre-copy ld-linux with sudo
        run: |
          mkdir -p AppDir/lib64
          sudo cp -a /lib64/ld-linux-x86-64.so.2 AppDir/lib64/ld-linux-x86-64.so.2
          sudo chmod 755 AppDir/lib64/ld-linux-x86-64.so.2
          sudo chown runner:runner AppDir/lib64/ld-linux-x86-64.so.2
          ls -la AppDir/lib64/

      # ── 5. CMake 빌드 (build-appimage.sh 와 동일한 옵션) ──────────────
      - name: Configure CMake
        run: |
          cmake \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPORTABLE=ON \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -B build \
            -S .

      - name: Build
        run: ninja -C build -j$(nproc)

      # ── 6. AppDir 생성 (build-appimage.sh 와 동일) ────────────────────
      - name: Install into AppDir
        run: |
          rm -rf AppDir/usr
          DESTDIR=AppDir ninja -C build install

      # ── 7. data 파일을 bin 옆에 복사 (build-appimage.sh 핵심 로직) ────
      - name: Copy data next to binary
        run: |
          if [ -d "AppDir/usr/share/nxengine/data" ]; then
            cp -r AppDir/usr/share/nxengine/data/ AppDir/usr/bin/
            echo "data copied to usr/bin/"
          else
            echo "data folder not found, AppDir structure:"
            find AppDir -type d | sort
          fi

      # ── 8. AppImage 빌드 (AppImageBuilder.yml 레시피 사용) ────────────
      - name: Build AppImage
        env:
          APP_ID: ${{ env.APP_ID }}
          APP_VERSION: ${{ env.APP_VERSION }}
          PLATFORM_SUFFIX: ${{ env.PLATFORM_SUFFIX }}
          OUTPUT: ${{ env.OUTPUT }}
        run: |
          appimage-builder --appdir AppDir --recipe AppImageBuilder.yml --skip-test

      # ── 9. 파일명 확인 ───────────────────────────────────────────────
      - name: Verify output
        run: |
          ls -lh *.AppImage
          echo "Output: ${{ env.OUTPUT }}"

      # ── 10. 아티팩트 업로드 ──────────────────────────────────────────
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT }}
          path: ${{ env.OUTPUT }}
          retention-days: 30

      # ── 11. 태그 푸시 시 GitHub Release 자동 생성 ────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: ${{ env.OUTPUT }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
