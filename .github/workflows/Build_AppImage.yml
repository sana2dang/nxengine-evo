name: Build Linux AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version (e.g. 2.6.5-1)'
        required: true
        default: '2.6.5-1'

env:
  APP_VERSION: ${{ github.event.inputs.version || '2.6.5-1' }}
  OUTPUT: NXEngine-Evo-v${{ github.event.inputs.version || '2.6.5-1' }}-Linux-x86_64.AppImage

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. 빌드 의존성 설치 ───────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq \
            cmake ninja-build \
            libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev \
            libjpeg-dev libpng-dev \
            patchelf desktop-file-utils \
            libgdk-pixbuf2.0-dev fakeroot \
            wget curl squashfs-tools file

      # ── 3. linuxdeploy + appimagetool 다운로드 ────────────────────────
      # appimage-builder 대신 공식 linuxdeploy 툴체인 사용
      # GitHub Actions는 FUSE 미지원 → --appimage-extract로 압축 해제 후 사용
      - name: Download linuxdeploy and appimagetool
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-sdl2/releases/download/continuous/linuxdeploy-plugin-sdl2-x86_64.AppImage"
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-sdl2-x86_64.AppImage appimagetool-x86_64.AppImage

          ./linuxdeploy-x86_64.AppImage --appimage-extract            && mv squashfs-root linuxdeploy
          ./linuxdeploy-plugin-sdl2-x86_64.AppImage --appimage-extract && mv squashfs-root linuxdeploy-plugin-sdl2
          ./appimagetool-x86_64.AppImage --appimage-extract            && mv squashfs-root appimagetool

      # ── 4. CMake 빌드 ─────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPORTABLE=ON \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -B build \
            -S .

      - name: Build
        run: ninja -C build -j$(nproc)

      # ── 5. AppDir 구성 ────────────────────────────────────────────────
      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/nxengine
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # 바이너리 복사
          cp build/nxengine-evo AppDir/usr/bin/nxengine-evo

          # data 디렉터리 복사
          if [ -d data ]; then
            cp -r data AppDir/usr/share/nxengine/
          fi

          # .desktop 파일 생성
          cat > AppDir/usr/share/applications/org.nxengine.nxengine_evo.desktop << 'EOF'
          [Desktop Entry]
          Name=Cave Story (NXEngine Evo)
          Exec=nxengine-evo
          Icon=org.nxengine.nxengine_evo
          Type=Application
          Categories=Game;
          EOF

          # 아이콘: platform/linux 또는 screenshot.png 사용
          ICON_SRC=""
          if [ -f platform/linux/org.nxengine.nxengine_evo.png ]; then
            ICON_SRC="platform/linux/org.nxengine.nxengine_evo.png"
          elif [ -f screenshot.png ]; then
            ICON_SRC="screenshot.png"
          fi
          if [ -n "$ICON_SRC" ]; then
            cp "$ICON_SRC" AppDir/usr/share/icons/hicolor/256x256/apps/org.nxengine.nxengine_evo.png
          fi

      # ── 6. linuxdeploy로 의존 라이브러리 번들링 + AppImage 생성 ───────
      - name: Bundle and package AppImage
        run: |
          export PATH="$PWD/linuxdeploy-plugin-sdl2/usr/bin:$PATH"

          ./linuxdeploy/AppRun \
            --appdir AppDir \
            --executable AppDir/usr/bin/nxengine-evo \
            --desktop-file "AppDir/usr/share/applications/org.nxengine.nxengine_evo.desktop" \
            --icon-file "AppDir/usr/share/icons/hicolor/256x256/apps/org.nxengine.nxengine_evo.png" \
            --plugin sdl2

          # linuxdeploy가 AppImage를 만들지 않았을 경우 appimagetool로 직접 생성
          if ! ls *.AppImage 2>/dev/null | grep -qv "linuxdeploy\|plugin\|appimagetool"; then
            ARCH=x86_64 ./appimagetool/AppRun AppDir "${{ env.OUTPUT }}"
          fi

      # ── 7. 파일명 통일 ────────────────────────────────────────────────
      - name: Rename AppImage
        run: |
          FOUND=$(ls *.AppImage 2>/dev/null | grep -v "linuxdeploy\|plugin\|appimagetool" | head -n1)
          if [ -n "$FOUND" ] && [ "$FOUND" != "${{ env.OUTPUT }}" ]; then
            mv "$FOUND" "${{ env.OUTPUT }}"
          fi
          echo "✅ AppImage: $(ls ${{ env.OUTPUT }})"

      # ── 8. 아티팩트 업로드 ───────────────────────────────────────────
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT }}
          path: ${{ env.OUTPUT }}
          retention-days: 30

      # ── 9. 태그 푸시 시 GitHub Release 자동 생성 ─────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: ${{ env.OUTPUT }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
