name: Build Linux AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version (e.g. 2.6.5-1)'
        required: true
        default: '2.6.5-1'

env:
  APP_VERSION: ${{ github.event.inputs.version || '2.6.5-1' }}
  OUTPUT: NXEngine-Evo-v${{ github.event.inputs.version || '2.6.5-1' }}-Linux-x86_64.AppImage

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. 빌드 의존성 설치 ───────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq \
            cmake ninja-build \
            libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev \
            libjpeg-dev libpng-dev \
            patchelf desktop-file-utils \
            libgdk-pixbuf2.0-dev fakeroot \
            curl squashfs-tools file

      # ── 3. linuxdeploy + appimagetool 다운로드 ────────────────────────
      # wget 대신 curl -L 사용 (GitHub redirect 안정적으로 처리)
      # 고정 릴리즈 태그 사용으로 URL 변경 문제 방지
      - name: Download linuxdeploy and appimagetool
        run: |
          # linuxdeploy (고정 릴리즈)
          curl -fsSL -o linuxdeploy-x86_64.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20250213-2/linuxdeploy-x86_64.AppImage"

          # linuxdeploy SDL2 플러그인
          curl -fsSL -o linuxdeploy-plugin-sdl2-x86_64.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-sdl2/releases/download/continuous/linuxdeploy-plugin-sdl2-x86_64.AppImage"

          # appimagetool
          curl -fsSL -o appimagetool-x86_64.AppImage \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"

          chmod +x linuxdeploy-x86_64.AppImage \
                   linuxdeploy-plugin-sdl2-x86_64.AppImage \
                   appimagetool-x86_64.AppImage

          # GitHub Actions는 FUSE 미지원 → --appimage-extract로 압축 해제 후 실행
          ./linuxdeploy-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy

          ./linuxdeploy-plugin-sdl2-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy-plugin-sdl2

          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool

      # ── 4. CMake 빌드 ─────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPORTABLE=ON \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -B build \
            -S .

      - name: Build
        run: ninja -C build -j$(nproc)

      # ── 5. AppDir 구성 ────────────────────────────────────────────────
      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/nxengine
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # 바이너리 복사
          cp build/nxengine-evo AppDir/usr/bin/nxengine-evo

          # data 디렉터리 복사
          if [ -d data ]; then
            cp -r data AppDir/usr/share/nxengine/
          fi

          # .desktop 파일 생성
          cat > AppDir/usr/share/applications/org.nxengine.nxengine_evo.desktop << 'EOF'
          [Desktop Entry]
          Name=Cave Story (NXEngine Evo)
          Exec=nxengine-evo
          Icon=org.nxengine.nxengine_evo
          Type=Application
          Categories=Game;
          EOF

          # 아이콘 복사
          if [ -f platform/linux/org.nxengine.nxengine_evo.png ]; then
            cp platform/linux/org.nxengine.nxengine_evo.png \
               AppDir/usr/share/icons/hicolor/256x256/apps/org.nxengine.nxengine_evo.png
          elif [ -f screenshot.png ]; then
            cp screenshot.png \
               AppDir/usr/share/icons/hicolor/256x256/apps/org.nxengine.nxengine_evo.png
          fi

      # ── 6. 의존 라이브러리 번들링 ─────────────────────────────────────
      - name: Bundle libraries with linuxdeploy
        run: |
          export PATH="$PWD/linuxdeploy-plugin-sdl2/usr/bin:$PATH"

          ./linuxdeploy/AppRun \
            --appdir AppDir \
            --executable AppDir/usr/bin/nxengine-evo \
            --desktop-file "AppDir/usr/share/applications/org.nxengine.nxengine_evo.desktop" \
            --icon-file "AppDir/usr/share/icons/hicolor/256x256/apps/org.nxengine.nxengine_evo.png" \
            --plugin sdl2
          # --output appimage 없이 실행 → AppDir에 라이브러리만 번들링

      # ── 7. appimagetool로 AppImage 최종 생성 ─────────────────────────
      - name: Create AppImage
        run: |
          ARCH=x86_64 ./appimagetool/AppRun AppDir "${{ env.OUTPUT }}"
          echo "✅ 생성된 AppImage: $(ls ${{ env.OUTPUT }})"

      # ── 8. 아티팩트 업로드 ───────────────────────────────────────────
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT }}
          path: ${{ env.OUTPUT }}
          retention-days: 30

      # ── 9. 태그 푸시 시 GitHub Release 자동 생성 ─────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: ${{ env.OUTPUT }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
