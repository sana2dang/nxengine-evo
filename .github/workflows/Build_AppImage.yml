name: Build Linux AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version (e.g. v2.6.5-1)'
        required: true
        default: 'v2.6.5-1'

env:
  APP_ID: org.nxengine.nxengine_evo
  APP_VERSION: ${{ github.event.inputs.version || 'v2.6.5-1' }}
  PLATFORM_SUFFIX: x86_64
  OUTPUT: NXEngine-Evo-${{ github.event.inputs.version || 'v2.6.5-1' }}-Linux-x86_64.AppImage

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. 빌드 의존성 설치 ───────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq \
            cmake ninja-build \
            libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev \
            libjpeg-dev libpng-dev \
            patchelf desktop-file-utils \
            libgdk-pixbuf2.0-dev fakeroot \
            squashfs-tools file \
            python3-pip libxml2-utils

      # ── 3. appimage-builder 설치 (build-appimage.sh 와 동일한 v1.1.0) ─
      - name: Install appimage-builder v1.1.0
        run: |
          pip3 install appimage-builder==1.1.0

      # ── 4. CMake 빌드 (build-appimage.sh 와 동일한 옵션) ──────────────
      # PREFIX=/usr + DESTDIR=AppDir 조합 → AppDir/usr/ 구조 자동 생성
      - name: Configure CMake
        run: |
          cmake \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPORTABLE=ON \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -B build \
            -S .

      - name: Build
        run: ninja -C build -j$(nproc)

      # ── 5. AppDir 생성 (build-appimage.sh 와 동일) ────────────────────
      - name: Install into AppDir
        run: |
          rm -rf AppDir
          DESTDIR=AppDir ninja -C build install

      # ── 6. data 파일을 bin 옆에 복사 (build-appimage.sh 핵심 로직) ────
      # cp -r build/AppDir/usr/share/nxengine/data/ build/AppDir/usr/bin/
      - name: Copy data next to binary
        run: |
          if [ -d "AppDir/usr/share/nxengine/data" ]; then
            cp -r AppDir/usr/share/nxengine/data/ AppDir/usr/bin/
            echo "✅ data 폴더를 usr/bin/ 옆에 복사 완료"
          else
            echo "⚠️ data 폴더 없음 - cmake install 결과 확인:"
            find AppDir -type d | sort
          fi

      # ── 7. AppImage 빌드 (AppImageBuilder.yml 레시피 사용) ────────────
      - name: Build AppImage
        env:
          APP_ID: ${{ env.APP_ID }}
          APP_VERSION: ${{ env.APP_VERSION }}
          PLATFORM_SUFFIX: ${{ env.PLATFORM_SUFFIX }}
          OUTPUT: ${{ env.OUTPUT }}
        run: |
          appimage-builder --appdir AppDir --recipe AppImageBuilder.yml --skip-test

      # ── 8. 파일명 확인 ───────────────────────────────────────────────
      - name: Verify output
        run: |
          ls -lh *.AppImage
          echo "✅ 생성된 파일: ${{ env.OUTPUT }}"

      # ── 9. 아티팩트 업로드 ───────────────────────────────────────────
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT }}
          path: ${{ env.OUTPUT }}
          retention-days: 30

      # ── 10. 태그 푸시 시 GitHub Release 자동 생성 ────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: ${{ env.OUTPUT }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
